QuestTalk0=William says: What? Really? Wow.. Seems as if theres some dark magic beyond our control brewing in the world. Ive lost my connection with the outside world ive been down here so long. My soldiers reported a strange building growing from the ground to the west of here. Please bring my back some indication that these rumors are true!
